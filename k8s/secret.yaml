# ========================================================================================
# 🔐 SECRET: Datos sensibles de la aplicación
# ========================================================================================
# PROPÓSITO:
#   Secret almacena datos SENSIBLES: contraseñas, tokens, claves de API
#   Los datos se almacenan codificados en base64 (NO encriptados por defecto)
#   Se inyectan en los contenedores como variables de entorno
#
# CARACTERÍSTICAS:
#   - BASE64 ENCODED (protección mínima, no es encriptación real)
#   - NO VERSIONADO en Git (agregar a .gitignore)
#   - ACCESO RESTRINGIDO a través de RBAC de Kubernetes
#   - MEJOR: Usar herramientas como HashiCorp Vault o AWS Secrets Manager
#
# ⚠️  SEGURIDAD CRÍTICA:
#     1. Cambiar DB_PASSWORD en producción (actual: "postgres" - INSEGURO)
#     2. Cambiar JWT_SECRET en producción (actual: "change-this-secret-key" - INSEGURO)
#     3. Usar encriptación etcd en Kubernetes
#     4. NUNCA commitear en Git (usar .gitignore o secretos de CI/CD)
# ========================================================================================

apiVersion: v1
kind: Secret
metadata:
  # Nombre del Secret - Se referencia desde deployment.yaml
  name: app-secret
  
# Tipo de Secret
# - Opaque: datos arbitrarios (texto, binario, etc)
# - kubernetes.io/basic-auth: para autenticación HTTP basic
# - docker-registry: para credenciales de Docker
type: Opaque

data:
  # ========== CREDENCIALES DE BASE DE DATOS ==========
  # Los valores están en BASE64 (no es encriptación)
  # Decoding:
  #   - cG9zdGdyZXM= → "postgres"
  #
  # Codificar un valor nuevo:
  #   echo -n "mi-password-nuevo" | base64
  
  # Usuario de PostgreSQL
  # ACTUAL: postgres (base64)
  # ⚠️  CAMBIAR EN PRODUCCIÓN a algo como: "db_user_prod"
  DB_USER: cG9zdGdyZXM=
  
  # Contraseña de PostgreSQL
  # ACTUAL: postgres (base64) - ¡¡CAMBIAR!!
  # RECOMENDACIÓN: 32+ caracteres alfanuméricos + especiales
  DB_PASSWORD: cG9zdGdyZXM=
  
  # ========== TOKENS Y CLAVES ==========
  # JWT Secret para firmar tokens de autenticación
  # ACTUAL: change-this-secret-key (base64) - ¡¡CAMBIAR!!
  # RECOMENDACIÓN: Usar cryptographically secure random string
  #   - Mínimo 32 caracteres
  #   - Incluir mayúsculas, minúsculas, números, caracteres especiales
  JWT_SECRET: Y2hhbmdlLXRoaXMtc2VjcmV0LWtleQ==
