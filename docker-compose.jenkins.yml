version: '3.9'

# ================================ SERVICIOS ================================
services:
  # ==================== STAGE 1: DATABASE ====================
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    container_name: gerson_postgres
    image: gerson-postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-polleria_gerson}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gerson_network
    labels:
      component: "database"
      jenkins-pipeline: "database"
      stage: "1-infrastructure"

  # ==================== STAGE 2: TESTS ====================
  tests:
    build:
      context: .
      dockerfile: docker/Dockerfile.tests
    container_name: gerson_tests
    image: gerson-tests:latest
    depends_on:
      - postgres
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-polleria_gerson}?schema=public
    volumes:
      - ./test-results:/app/test-results
      - ./coverage:/app/coverage
    networks:
      - gerson_network
    labels:
      component: "tests"
      jenkins-pipeline: "quality-assurance"
      stage: "2-testing"
    command: npm test -- --coverage

  # ==================== STAGE 3: BUILD & LINT ====================
  builder:
    build:
      context: .
      dockerfile: docker/Dockerfile.builder
    container_name: gerson_builder
    image: gerson-builder:latest
    depends_on:
      - tests
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://build:[REDACTED]@127.0.0.1:5432/build
    volumes:
      - ./.next:/app/.next
    networks:
      - gerson_network
    labels:
      component: "builder"
      jenkins-pipeline: "build"
      stage: "3-building"

  # ==================== STAGE 4: RUNTIME ====================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.runtime
    container_name: gerson_backend
    image: gerson-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-polleria_gerson}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-polleria_gerson}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      LOKI_URL: http://loki:3100
    ports:
      - "3000:3000"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - gerson_network
    labels:
      component: "backend"
      jenkins-pipeline: "deployment"
      stage: "4-runtime"

  # ==================== STAGE 5: LOGGING ====================
  loki:
    image: grafana/loki:latest
    container_name: gerson_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - gerson_network
    labels:
      component: "logging"
      jenkins-pipeline: "observability"
      stage: "5-logging"

  promtail:
    image: grafana/promtail:latest
    container_name: gerson_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    command: -config.file=/etc/promtail/config.yml
    networks:
      - gerson_network
    depends_on:
      - loki
    labels:
      component: "logging"
      jenkins-pipeline: "observability"
      stage: "5-logging"

  # ==================== STAGE 6: MONITORING ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: gerson_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/rules.yml:/etc/prometheus/rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - gerson_network
    depends_on:
      - backend
    labels:
      component: "monitoring"
      jenkins-pipeline: "observability"
      stage: "6-monitoring"

  grafana:
    image: grafana/grafana:latest
    container_name: gerson_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning
    networks:
      - gerson_network
    depends_on:
      - prometheus
      - loki
    labels:
      component: "monitoring"
      jenkins-pipeline: "observability"
      stage: "6-monitoring"

  # ==================== STAGE 7: ALERTING ====================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: gerson_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/config.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - gerson_network
    depends_on:
      - prometheus
    labels:
      component: "alerting"
      jenkins-pipeline: "observability"
      stage: "7-alerting"

# ================================ VOLUMES ================================
volumes:
  postgres_data:
    driver: local
  loki_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

# ================================ NETWORKS ================================
networks:
  gerson_network:
    driver: bridge
