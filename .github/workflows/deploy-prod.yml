name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de imagen a promover (ej: sha-abc123...)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_NAMESPACE: default
  K8S_DEPLOYMENT: backend
  K8S_CONTAINER: backend
  HEALTHCHECK_URL: ${{ vars.PROD_HEALTHCHECK_URL }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"

      - name: Build image reference
        id: image
        run: echo "ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Set image in Kubernetes deployment
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" set image deployment/${{ env.K8S_DEPLOYMENT }} \
            ${{ env.K8S_CONTAINER }}=${{ steps.image.outputs.ref }}

      - name: Wait for rollout
        run: kubectl -n "${{ env.K8S_NAMESPACE }}" rollout status deployment/${{ env.K8S_DEPLOYMENT }} --timeout=180s

      - name: Smoke test
        if: ${{ env.HEALTHCHECK_URL != '' }}
        run: curl --fail --silent --show-error "${{ env.HEALTHCHECK_URL }}"
