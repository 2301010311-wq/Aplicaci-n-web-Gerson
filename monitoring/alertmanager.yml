global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://backend:3000/api/alerts'

  - name: 'critical'
    webhook_configs:
      - url: 'http://backend:3000/api/alerts/critical'

  - name: 'warning'
    webhook_configs:
      - url: 'http://backend:3000/api/alerts/warning'
