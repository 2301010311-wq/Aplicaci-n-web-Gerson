# Docker Compose - Usando PostgreSQL 17 en Neon Cloud
# ⚠️ ESTA VERSIÓN USA BD EXTERNA (Neon), no local

services:
  # ==================== BACKEND (sin BD local) ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gerson_backend
    restart: unless-stopped
    # ⚠️ NO depende de postgres local - usa Neon cloud
    environment:
      NODE_ENV: production
      PORT: 3000
      # BD Externa - Neon PostgreSQL 17
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      LOKI_URL: http://loki:3100
    ports:
      - "3000:3000"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - gerson_network
    volumes:
      - ./logs:/app/logs

  # ==================== LOGGING: Loki ====================
  loki:
    image: grafana/loki:latest
    container_name: gerson_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - gerson_network

  # ==================== LOG COLLECTOR: Promtail ====================
  promtail:
    image: grafana/promtail:latest
    container_name: gerson_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    command: -config.file=/etc/promtail/config.yml
    networks:
      - gerson_network
    depends_on:
      - loki

  # ==================== METRICS: Prometheus ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: gerson_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/rules.yml:/etc/prometheus/rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - gerson_network

  # ==================== VISUALIZATION: Grafana ====================
  grafana:
    image: grafana/grafana:latest
    container_name: gerson_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning
    networks:
      - gerson_network
    depends_on:
      - prometheus
      - loki

  # ==================== ALERTING: AlertManager ====================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: gerson_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/config.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    networks:
      - gerson_network

volumes:
  loki_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

networks:
  gerson_network:
    driver: bridge
